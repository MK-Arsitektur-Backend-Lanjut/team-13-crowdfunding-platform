[www]
user = www-data
group = www-data

pm = dynamic
pm.max_children = 100
pm.start_servers = 20
pm.min_spare_servers = 20
pm.max_spare_servers = 40
pm.process_idle_timeout = 10s
pm.max_requests = 2000

listen = 9000
listen.backlog = 1024

request_terminate_timeout = 30s

security.limit_extensions = .php
