[www]
user = www-data
group = www-data

pm = dynamic
pm.max_children = 120
pm.start_servers = 20
pm.min_spare_servers = 20
pm.max_spare_servers = 40
pm.process_idle_timeout = 10s
pm.max_requests = 1000

listen = 9000
listen.backlog = 2048

request_terminate_timeout = 60s

security.limit_extensions = .php
