[www]
user = www-data
group = www-data

pm = dynamic
pm.max_children = 80
pm.start_servers = 10
pm.min_spare_servers = 10
pm.max_spare_servers = 30
pm.process_idle_timeout = 10s
pm.max_requests = 1000

listen = 9000
listen.backlog = 1024

request_terminate_timeout = 30s

security.limit_extensions = .php
