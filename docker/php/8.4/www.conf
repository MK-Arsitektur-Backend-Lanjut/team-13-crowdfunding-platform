[www]
; User and group - REQUIRED for PHP-FPM to start
user = www-data
group = www-data

; Process manager settings optimized for concurrent load
pm = ondemand
pm.max_children = 100
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Listen on default socket
listen = 9000

; Aligned with Nginx fastcgi_read_timeout to prevent premature termination
request_terminate_timeout = 60s

; Security
; Limit extensions to .php only
security.limit_extensions = .php