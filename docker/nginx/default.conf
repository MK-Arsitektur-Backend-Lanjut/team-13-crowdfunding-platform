server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    index index.php index.html;

    # Batasi body upload
    client_max_body_size 50M;

    # Main request buffering settings
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass crowdfunding_app:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeout settings aligned with PHP-FPM
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
        fastcgi_connect_timeout 10;

        # Optimized buffering for large JSON responses
        fastcgi_buffering on;
        fastcgi_buffer_size 8k;
        fastcgi_buffers 512 8k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 512k;
        fastcgi_max_temp_file_size 1024m;

        # Compress responses
        fastcgi_keep_conn on;
        gzip on;
        gzip_types application/json text/plain text/css application/javascript;
        gzip_min_length 1000;
    }

    location ~* \.(jpg|jpeg|gif|css|png|js|ico|svg)$ {
        expires max;
        log_not_found off;
        access_log off;
    }
}
