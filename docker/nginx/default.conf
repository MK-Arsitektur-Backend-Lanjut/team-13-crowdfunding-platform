upstream php_fpm {
    server crowdfunding_app:9000;
    keepalive 64;
}

fastcgi_cache_path /var/cache/nginx/stats levels=1:2 keys_zone=stats_cache:10m max_size=50m inactive=120s use_temp_path=off;

server {
    listen 80;
    server_name localhost;
    keepalive_timeout 65;
    root /var/www/html/public;

    index index.php index.html;

    client_max_body_size 50M;

    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    location = /api/donations/stats {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_pass php_fpm;
        fastcgi_keep_conn on;

        fastcgi_read_timeout 30;
        fastcgi_send_timeout 30;
        fastcgi_connect_timeout 5;

        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;

        fastcgi_cache stats_cache;
        fastcgi_cache_key "GET|/api/donations/stats";
        fastcgi_cache_valid 200 30s;
        fastcgi_cache_use_stale updating error timeout http_500 http_503;
        fastcgi_ignore_headers Set-Cookie Cache-Control Expires;
        add_header X-Fastcgi-Cache $upstream_cache_status always;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;
        fastcgi_connect_timeout 10;

        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;

        fastcgi_keep_conn on;
    }

    location ~* \.(jpg|jpeg|gif|css|png|js|ico|svg)$ {
        expires max;
        log_not_found off;
        access_log off;
    }
}
