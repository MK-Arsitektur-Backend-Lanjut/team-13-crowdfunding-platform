$kind: http-request
url: "{{base_url}}/api/donations"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  X-Idempotency-Key: "{{idempotency_key}}"
body:
  type: text
  content: |-
    {
      "campaign_id": {{campaign_id}},
      "amount": 125000,
      "is_anonymous": false,
      "donor_name": "Postman User",
      "note": "Donasi test dari collection Postman"
    }
scripts:
  - type: beforeRequest
    code: |-
      const key = 'pm-donation-' + Date.now() + '-' + Math.floor(Math.random() * 1000000);
      pm.variables.set('idempotency_key', key);
      pm.collectionVariables.set('idempotency_key', key);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 201', function () {
        pm.response.to.have.status(201);
      });
      const json = pm.response.json();
      if (json && json.data && json.data.id) {
        pm.collectionVariables.set('donation_id', String(json.data.id));
        pm.environment.set('donation_id', String(json.data.id));
      }
    language: text/javascript
order: 1000
