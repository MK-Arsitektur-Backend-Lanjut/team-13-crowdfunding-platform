services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crowdfunding_app
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: error
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: crowdfunding
      DB_USERNAME: user
      DB_PASSWORD: password
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CACHE_DB: 1
      REDIS_PERSISTENT: "true"
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - .:/var/www/html
    expose:
      - "9000"
    depends_on:
      - mysql
      - redis
    mem_limit: "8g"
    cpus: "8.0"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crowdfunding_worker
    working_dir: /var/www/html
    command: php artisan queue:work --daemon
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: error
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: crowdfunding
      DB_USERNAME: user
      DB_PASSWORD: password
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CACHE_DB: 1
      REDIS_PERSISTENT: "true"
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
      - app

  nginx:
    image: nginx:alpine
    container_name: crowdfunding_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    command: >
      /bin/sh -c "mkdir -p /var/cache/nginx/stats && nginx -g 'daemon off;'"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8
    command:
      - mysqld
      - --max-connections=800
      - --innodb-buffer-pool-size=4G
    container_name: crowdfunding_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crowdfunding
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: crowdfunding_redis
    restart: always
    ports:
      - "6379:6379"