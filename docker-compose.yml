services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crowdfunding_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    expose:
      - "9000"
    # php-fpm listens on 9000 by default inside container
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: crowdfunding_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: crowdfunding_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crowdfunding
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: crowdfunding_redis
    restart: always
    ports:
      - "6379:6379"